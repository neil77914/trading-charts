const months = Object.keys(D);

// 調色盤
const COLORS = ['#1D9E75','#378ADD','#E8742A','#9B59B6','#E74C3C','#2ECC71','#F39C12','#1ABC9C'];

// ===== 單月模式 =====
const sel = document.getElementById('monthSel');
months.forEach(m => {
  const total = D[m].cum[D[m].cum.length-1];
  const o = document.createElement('option');
  o.value = m;
  o.textContent = m + '  (' + (total>=0?'+':'') + total.toLocaleString() + ')';
  sel.appendChild(o);
});

let chart = null;
function render(m) {
  const d = D[m];
  const total = d.cum[d.cum.length-1];
  const mn = Math.min(0, ...d.cum), mx = Math.max(0, ...d.cum);
  document.getElementById('stats').textContent =
    m + '：' + d.cum.length + ' 筆，月損益 ' +
    (total>=0?'+':'') + total.toLocaleString() +
    '，月內最高 ' + mx.toLocaleString() +
    '，最低 ' + mn.toLocaleString();
  const color = total >= 0 ? '#1D9E75' : '#C43C3C';
  const labels = d.cum.map((_, i) => '#' + (i+1) + '（' + d.days[i] + '日）');
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('eqChart'), {
    type: 'line',
    data: { labels, datasets: [{ data: d.cum, borderColor: color,
      backgroundColor: color + '22', fill: true,
      pointRadius: d.cum.length > 60 ? 0 : 2, borderWidth: 2, tension: 0.1 }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: {
          title: items => '第' + (items[0].dataIndex+1) + '筆（' + D[m].days[items[0].dataIndex] + '日）',
          label: ctx => '累計：' + ctx.parsed.y.toLocaleString()
        }}},
      scales: {
        x: { ticks: { autoSkip: true, maxTicksLimit: 12, font:{size:10} }, grid: { display:false }},
        y: { ticks: { font:{size:11}, callback: v => (v>=0?'+':'') + (v/1000).toFixed(0) + 'k' },
             grid: { color: 'rgba(0,0,0,0.05)' }}
      }
    }
  });
}

sel.addEventListener('change', () => render(sel.value));
document.getElementById('prevBtn').onclick = () => {
  const i = months.indexOf(sel.value); if (i>0){ sel.value=months[i-1]; render(sel.value); }};
document.getElementById('nextBtn').onclick = () => {
  const i = months.indexOf(sel.value); if (i<months.length-1){ sel.value=months[i+1]; render(sel.value); }};
sel.value = months[months.length-1];
render(sel.value);

// ===== 疊圖模式 =====
let overlayMonths = [];
let overlayChart = null;

function addOverlay() {
  const v = document.getElementById('overlayInput').value.trim();
  if (!v) return;
  if (!D[v]) { alert('找不到月份：' + v + '，請用 YYYY-MM 格式'); return; }
  if (overlayMonths.includes(v)) { alert(v + ' 已加入'); return; }
  if (overlayMonths.length >= 8) { alert('最多 8 個月份'); return; }
  overlayMonths.push(v);
  document.getElementById('overlayInput').value = '';
  renderTags();
  renderOverlay();
}

function removeOverlay(m) {
  overlayMonths = overlayMonths.filter(x => x !== m);
  renderTags();
  renderOverlay();
}

function clearOverlay() {
  overlayMonths = [];
  renderTags();
  renderOverlay();
}

function renderTags() {
  const area = document.getElementById('tagArea');
  area.innerHTML = '';
  overlayMonths.forEach((m, i) => {
    const total = D[m].cum[D[m].cum.length-1];
    const div = document.createElement('div');
    div.className = 'tag';
    div.style.background = COLORS[i % COLORS.length];
    div.innerHTML = m + ' (' + (total>=0?'+':'') + (total/1000).toFixed(0) + 'k)' +
      ' <span onclick="removeOverlay(\'' + m + '\')">×</span>';
    area.appendChild(div);
  });
}

function renderOverlay() {
  if (overlayChart) { overlayChart.destroy(); overlayChart = null; }
  if (overlayMonths.length === 0) return;

  // X 軸用「第幾筆」對齊
  const maxLen = Math.max(...overlayMonths.map(m => D[m].cum.length));
  const labels = Array.from({length: maxLen}, (_, i) => '第' + (i+1) + '筆');

  const datasets = overlayMonths.map((m, i) => ({
    label: m,
    data: D[m].cum,
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: 'transparent',
    pointRadius: maxLen > 80 ? 0 : 2,
    borderWidth: 2,
    tension: 0.1
  }));

  // 加一條 y=0 基準線
  datasets.unshift({
    label: '基準線(0)',
    data: Array(maxLen).fill(0),
    borderColor: '#ccc',
    borderDash: [4,4],
    borderWidth: 1,
    pointRadius: 0,
    backgroundColor: 'transparent'
  });

  overlayChart = new Chart(document.getElementById('overlayChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font:{size:12}, boxWidth:16 }},
        tooltip: { mode: 'index', intersect: false,
          callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString() }}
      },
      scales: {
        x: { ticks: { autoSkip: true, maxTicksLimit: 12, font:{size:10} }, grid: { display:false }},
        y: { ticks: { font:{size:11}, callback: v => (v>=0?'+':'') + (v/1000).toFixed(0) + 'k' },
             grid: { color: 'rgba(0,0,0,0.05)' }}
      },
      interaction: { mode: 'index', intersect: false }
    }
  });
}

// Enter 鍵觸發加入
document.getElementById('overlayInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addOverlay();
});

// 模式切換
function setMode(m) {
  document.getElementById('secSingle').classList.toggle('show', m==='single');
  document.getElementById('secOverlay').classList.toggle('show', m==='overlay');
  document.getElementById('btnSingle').classList.toggle('active', m==='single');
  document.getElementById('btnOverlay').classList.toggle('active', m==='overlay');
}
</script>
